name: Release Build Distribution

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: gpupatch-cli.exe
            asset_name: gpupatch-windows-amd64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: gpupatch-cli
            asset_name: gpupatch-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: gpupatch-cli
            asset_name: gpupatch-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: gpupatch-cli
            asset_name: gpupatch-macos-arm64

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Compile Production Binaries
        run: |
          cargo build --release --workspace --target ${{ matrix.target }}
          cd node-module && npm install && npm run build

      - name: Stage Assets for Upload
        shell: bash
        run: |
          mkdir staging
          # Define binaries
          CLI_BIN="gpupatch"
          GUI_BIN="companion"
          EXT=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXT=".exe"
          fi

          # Copy binaries
          cp target/${{ matrix.target }}/release/${CLI_BIN}${EXT} ./staging/${CLI_BIN}-${{ matrix.target }}${EXT}
          cp target/${{ matrix.target }}/release/${GUI_BIN}${EXT} ./staging/${GUI_BIN}-${{ matrix.target }}${EXT}

          # Copy Node module
          cp node-module/*.node ./staging/gpupatch-node-${{ matrix.target }}.node

          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x ./staging/*
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./staging/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
